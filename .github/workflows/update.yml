name: Update BVMT Prices
on:
  schedule:
    - cron: '30 16 * * 1-5'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber pillow requests

      - name: Run scraper
        run: python scraper.py

      - name: Commit prices.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json
          git diff --staged --quiet && echo "No changes" || (git commit -m "prices $(date +'%Y-%m-%d')" && git push)
